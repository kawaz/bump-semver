name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Cache Pkl packages
        uses: actions/cache@v4
        with:
          path: ~/.pkl/cache
          key: pkl-cache-${{ hashFiles('PklProject.deps.json', '**/PklProject.deps.json') }}
          restore-keys: |
            pkl-cache-
      # pkfire 0.5.0+ で action 用の `v<version>` tag (v0.6.0 / v0 等) が
      # upstream に切られたので SHA pin 不要 (kawaz/pkf-tasks の DR-0004 は
      # Superseded)。
      - name: Setup pkfire (pkfire@0.6.0)
        uses: mizchi/pkfire@v0.6.0
      - run: pkf run ci
