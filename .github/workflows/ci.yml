name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - uses: extractions/setup-just@v4
        with:
          # ローカル開発と CI で `just --fmt --check --unstable` の判定を揃えるため version pin
          just-version: 1.49.0
      - run: just ci
