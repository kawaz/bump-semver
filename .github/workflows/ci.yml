name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Install pkl (needed by lint:pkl)
        uses: pkl-community/setup-pkl@v0
        with:
          pkl-version: "0.31.1"
      - name: Install just
        uses: extractions/setup-just@v3
      - run: just ci
