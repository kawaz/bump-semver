name: Release

on:
  push:
    branches: [main]
    paths:
      - "VERSION"

permissions:
  contents: write

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.current }}
      changed: ${{ steps.version.outputs.changed }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # bump-semver の `vcs tag latest` で全 tag が必要

      # bump-semver 自身を install (dogfooding)
      - name: Install bump-semver
        run: |
          set -euo pipefail
          BUMP_SEMVER_VERSION=$(tr -d '[:space:]' < VERSION)
          # 直前リリース版を使う (今 push してる VERSION ではなく、main にある最新 tag)
          # 自己ドッグフーディングだが、新規 release の検証に旧 release を使う構図
          LATEST=$(gh release list --repo kawaz/bump-semver --limit 1 --json tagName -q '.[0].tagName' | sed 's/^v//')
          if [ -z "$LATEST" ]; then
            # Bootstrap fallback: 過去 release が 1 件も無い (initial release / 全削除後)。
            # この checkout のソースから自前で build して使う。
            echo "::notice::No prior release found; bootstrapping from source."
            go build -buildvcs=false -trimpath \
              -ldflags "-s -w -X main.version=v${BUMP_SEMVER_VERSION}" \
              -o /usr/local/bin/bump-semver ./src
          else
            curl -fsSL --retry 5 --retry-delay 2 --max-time 60 \
              "https://github.com/kawaz/bump-semver/releases/download/v${LATEST}/bump-semver-linux-amd64" \
              -o /usr/local/bin/bump-semver
            chmod +x /usr/local/bin/bump-semver
          fi
          bump-semver --version
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Check version change
        id: version
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          CURRENT_VERSION=$(cat VERSION | tr -d '[:space:]')
          echo "current=${CURRENT_VERSION}" >> "$GITHUB_OUTPUT"

          # VERSION=0.0.0 (or empty) はプレースホルダとしてスキップ
          if [ -z "$CURRENT_VERSION" ] || [ "$CURRENT_VERSION" = "0.0.0" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Placeholder version (${CURRENT_VERSION:-empty}); skipping release."
            exit 0
          fi

          # semver 形式の検証 (bump-semver get -qq で exit code のみ検証)
          if ! bump-semver get "$CURRENT_VERSION" -qq; then
            echo "::error::Invalid VERSION format: ${CURRENT_VERSION}"
            exit 1
          fi

          # 既存 tag より大きいか検証 (二重リリース防止)
          # `vcs tag latest` は SemVer-parseable な tag のみ filter して
          # 最大を返す (DR-0020 PR-Tag-Latest, v0.29.0+)。
          # --include-prerelease は旧 `vcs:latest-tag()` の byte-identical
          # 移行 (旧実装は prerelease を含めていた) — README/UPGRADING で
          # 案内している移行手順と整合させるためここでも明示する。
          #
          # exit code 取り扱い:
          #   - 初回 release で tag が 1 件もない → exit 3 ("no semver-
          #     compatible tags found") → bootstrap として通過
          #   - **v0.28.0 ← v0.29.0 移行直後の 1 回限りの transient**:
          #     check-version job は「直前リリース版バイナリ」を install して
          #     dogfood する (= v0.28.0 を使う、本リリースを検証する用)。
          #     v0.28.0 は `vcs tag latest` を知らず unknown sub-verb で
          #     exit 2 を返す → 同じ bootstrap 分岐に流れ、二重 release は
          #     下の `gh release view` チェックが防ぐ。次の release 以降は
          #     v0.29.0+ が install されるため通常分岐に乗る。
          set +e
          LATEST=$(bump-semver vcs tag latest --include-prerelease --vcs git 2>/dev/null)
          LATEST_EXIT=$?
          set -e
          if [ "$LATEST_EXIT" -ne 0 ]; then
            echo "vcs tag latest exited ${LATEST_EXIT} (no SemVer tags yet, or old binary; see workflow comment); assuming first release"
          else
            set +e
            bump-semver compare gt VERSION "$LATEST"
            CMP_EXIT=$?
            set -e
            case "$CMP_EXIT" in
              0)
                # VERSION > latest tag: release 続行
                ;;
              1)
                # VERSION <= latest tag: 既にリリース済 or 巻き戻し
                echo "changed=false" >> "$GITHUB_OUTPUT"
                echo "Version v${CURRENT_VERSION} is not greater than latest tag ${LATEST}; skipping release."
                exit 0
                ;;
              *)
                echo "::error::Unexpected exit code from bump-semver compare: ${CMP_EXIT}"
                exit 1
                ;;
            esac
          fi

          # gh release で既存確認 (compare で通っても念のため)
          if gh release view "v${CURRENT_VERSION}" --repo "$REPO" >/dev/null 2>&1; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Version unchanged: v${CURRENT_VERSION} already released"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "New version detected: v${CURRENT_VERSION}"
          fi

  build:
    needs: check-version
    if: needs.check-version.outputs.changed == 'true'
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
            ext: ".exe"
          - goos: windows
            goarch: arm64
            ext: ".exe"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          VERSION: ${{ needs.check-version.outputs.version }}
          EXT: ${{ matrix.ext }}
        run: |
          OUTNAME="bump-semver-${GOOS}-${GOARCH}${EXT}"
          go build -trimpath \
            -ldflags "-s -w -X main.version=v${VERSION}" \
            -o "${OUTNAME}" \
            ./src

      - uses: actions/upload-artifact@v7
        with:
          name: bump-semver-${{ matrix.goos }}-${{ matrix.goarch }}
          path: bump-semver-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}

  release:
    needs: [check-version, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          merge-multiple: true

      - name: Create release with tag
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.check-version.outputs.version }}
          COMMIT_SHA: ${{ github.sha }}
          REPO: ${{ github.repository }}
        run: |
          gh release create "v${VERSION}" \
            --repo "$REPO" \
            --title "v${VERSION}" \
            --target "$COMMIT_SHA" \
            --generate-notes \
            bump-semver-*

  update-homebrew:
    needs: [check-version, release]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      # 今 build した freshly-built バイナリを PATH に入れて使う (= 真の dogfood)。
      # check-version の latest-release curl 方式と違い、今 release してる版そのものを
      # 使うので「commit/push サブコマンドの dogfooding が新版の挙動を検証」できる。
      - name: Install freshly-built bump-semver (dogfood)
        run: |
          install -m 0755 artifacts/bump-semver-linux-amd64/bump-semver-linux-amd64 /usr/local/bin/bump-semver
          bump-semver --version

      - name: Calculate checksums
        id: checksums
        run: |
          {
            echo "darwin_arm64=$(sha256sum artifacts/bump-semver-darwin-arm64/bump-semver-darwin-arm64 | cut -d' ' -f1)"
            echo "darwin_amd64=$(sha256sum artifacts/bump-semver-darwin-amd64/bump-semver-darwin-amd64 | cut -d' ' -f1)"
            echo "linux_arm64=$(sha256sum artifacts/bump-semver-linux-arm64/bump-semver-linux-arm64 | cut -d' ' -f1)"
            echo "linux_amd64=$(sha256sum artifacts/bump-semver-linux-amd64/bump-semver-linux-amd64 | cut -d' ' -f1)"
          } >> "$GITHUB_OUTPUT"

      - name: Checkout homebrew-tap
        uses: actions/checkout@v6
        with:
          repository: kawaz/homebrew-tap
          ssh-key: ${{ secrets.HOMEBREW_TAP_DEPLOY_KEY }}
          path: homebrew-tap

      - name: Update formula
        env:
          VERSION: ${{ needs.check-version.outputs.version }}
          DARWIN_ARM64: ${{ steps.checksums.outputs.darwin_arm64 }}
          DARWIN_AMD64: ${{ steps.checksums.outputs.darwin_amd64 }}
          LINUX_ARM64: ${{ steps.checksums.outputs.linux_arm64 }}
          LINUX_AMD64: ${{ steps.checksums.outputs.linux_amd64 }}
        run: |
          cat > homebrew-tap/Formula/bump-semver.rb <<FORMULA
          class BumpSemver < Formula
            desc "Focused semver bump CLI: detect by basename and operate on Cargo.toml / *.json / VERSION"
            homepage "https://github.com/kawaz/bump-semver"
            version "${VERSION}"
            license "MIT"

            on_macos do
              on_arm do
                url "https://github.com/kawaz/bump-semver/releases/download/v#{version}/bump-semver-darwin-arm64"
                sha256 "${DARWIN_ARM64}"
              end
              on_intel do
                url "https://github.com/kawaz/bump-semver/releases/download/v#{version}/bump-semver-darwin-amd64"
                sha256 "${DARWIN_AMD64}"
              end
            end

            on_linux do
              on_arm do
                url "https://github.com/kawaz/bump-semver/releases/download/v#{version}/bump-semver-linux-arm64"
                sha256 "${LINUX_ARM64}"
              end
              on_intel do
                url "https://github.com/kawaz/bump-semver/releases/download/v#{version}/bump-semver-linux-amd64"
                sha256 "${LINUX_AMD64}"
              end
            end

            def install
              bin.install Dir["bump-semver-*"].first => "bump-semver"
            end

            test do
              assert_match "v#{version}", shell_output("#{bin}/bump-semver --version")
              # Smoke test: pure VER positional arg exercises argv parser + semver bump
              # without touching the filesystem, which is enough to catch most
              # build / linking regressions on the target platform.
              assert_equal "1.2.4", shell_output("#{bin}/bump-semver patch 1.2.3").strip
              assert_equal "2.0.0", shell_output("#{bin}/bump-semver major 1.2.3").strip
              assert_equal "1.2.3", shell_output("#{bin}/bump-semver get 1.2.3").strip
              # compare exit codes (0 true / 1 false / 2 error)
              system "#{bin}/bump-semver", "compare", "eq", "1.2.3", "1.2.3"
              assert_predicate $?, :success?
            end
          end
          FORMULA

      - name: Commit and push formula
        env:
          VERSION: ${{ needs.check-version.outputs.version }}
        run: |
          cd homebrew-tap
          # git identity は fresh runner には無いため明示設定 (bump-semver は identity を自前設定しない)。
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # `vcs diff -q HEAD -- PATH` は差分あり=exit 1 (PR-3.1)。差分があるときだけ commit + push。
          # commit/push 双方 self-guard (PR-4 empty-no-op gate / PR-5.1 idempotent push) するが、
          # 旧 `git diff --staged --quiet` のファイルスコープ判定と同じ意味で gate しておくと
          # logs に意図が残る。
          if ! bump-semver vcs diff -q HEAD -- Formula/bump-semver.rb; then
            bump-semver vcs commit -m "Update bump-semver to ${VERSION}" Formula/bump-semver.rb
            bump-semver vcs push --branch main
          fi
