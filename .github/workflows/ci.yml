name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      # Install jj so the jj VCS backend tests (DR-0020 / DR-0026 / DR-0027 /
      # DR-0028) actually run; without jj they t.Skip("git+jj fixture requires
      # both binaries") and the backend stays unverified. Direct binary install
      # from GitHub releases (pinned version) avoids a third-party action. The
      # musl build is statically linked so it runs on ubuntu-latest as-is. The
      # release asset is a tar.gz whose root holds ./jj (plus LICENSE/README),
      # so extract only ./jj.
      - name: Install jj (exercises the jj VCS backend tests)
        run: |
          set -euo pipefail
          JJ_VERSION="0.41.0"
          curl -fsSL --retry 5 --retry-delay 2 --max-time 60 \
            "https://github.com/jj-vcs/jj/releases/download/v${JJ_VERSION}/jj-v${JJ_VERSION}-x86_64-unknown-linux-musl.tar.gz" \
            -o /tmp/jj.tar.gz
          tar -xzf /tmp/jj.tar.gz -C /usr/local/bin ./jj
          chmod +x /usr/local/bin/jj
          jj --version
      - name: Install just
        uses: extractions/setup-just@v4
      - run: just ci
