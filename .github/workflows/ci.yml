name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Cache Pkl packages
        uses: actions/cache@v4
        with:
          path: ~/.pkl/cache
          key: pkl-cache-${{ hashFiles('PklProject.deps.json', '**/PklProject.deps.json') }}
          restore-keys: |
            pkl-cache-
      # SHA pin: tag pin (`mizchi/pkfire@pkfire@0.4.0`) は GitHub Actions の
      # workflow parser が file-level error を起こす (kawaz/pkf-tasks の DR-0004
      # 参照)。pkfire 0.4.0 対応の commit を直接指す。
      - name: Setup pkfire (pkfire@0.4.0)
        uses: mizchi/pkfire@6e8f4735acd74407455ee6be3debfe9ca8c8e4e9
      - run: pkf run ci
